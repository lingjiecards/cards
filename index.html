<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>凌洁单词卡</title><style>body{margin:0;font-family:Arial;background:linear-gradient(135deg,#7dd3fc,#a78bfa);display:flex;justify-content:center;align-items:center;height:100vh}.wrap{width:360px}h1{text-align:center;color:#fff}.card{background:#fff;border-radius:20px;padding:60px 20px;text-align:center;font-size:34px;font-weight:bold;box-shadow:0 12px 28px rgba(0,0,0,.2);cursor:pointer}.tip{text-align:center;color:#fff;margin:12px}.btns{text-align:center;margin-top:15px}button{padding:10px 16px;margin:4px;border:none;border-radius:12px}</style></head><body><div class="wrap"><h1>📚 凌洁单词卡</h1><div id="card" class="card"></div><div class="tip">点击卡片翻面</div><div class="btns"><button onclick="prev()">⬅️</button><button onclick="next()">➡️</button><button onclick="rand()">🎲</button></div></div><script>const cards=[["mắt","眼睛"],["mũi","鼻子"],["miệng","嘴巴"],["khuôn mặt","脸、面部"],["tai","耳朵"],["tay","手"],["thịt gà","鸡肉"],["thịt bò","牛肉"],["tôm","虾"],["nho","葡萄"],["một chùm nho","一串葡萄"],["hôn nhân","婚姻"],["kết hôn","结婚"],["ly hôn","离婚"],["tái hôn","再婚"],["phàn nàn","抱怨"],["sổ mũi","流鼻涕"],["nghẹt mũi","鼻塞"],["cảm cúm","感冒"]];let i=0,f=true,c=document.getElementById('card');function show(){c.textContent=f?cards[i][0]:cards[i][1]}c.onclick=()=>{f=!f;show()};function next(){i=(i+1)%cards.length;f=true;show()}function prev(){i=(i-1+cards.length)%cards.length;f=true;show()}function rand(){i=Math.floor(Math.random()*cards.length);f=true;show()}show();</script></body></html>
